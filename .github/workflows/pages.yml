name: Deploy site

# Builds the Next.js landing page + Fumadocs docs (static export) and deploys to
# GitHub Pages. Requires Pages to be enabled for the repo with source = GitHub
# Actions (Settings → Pages).
on:
  push:
    branches: [main]
    paths: ["website/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - name: Build static site
        run: npm run build
        env:
          # Project pages serve under /<repo>; set the base path to match.
          PAGES_BASE_PATH: /tarjan
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: website/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
